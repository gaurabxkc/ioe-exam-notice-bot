name: Check IOE Notices

on:
  schedule:
    # Runs every 15 minutes. GitHub may delay this a bit during busy periods.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Send a test Discord message using the latest notice (does not affect tracked state)"
        type: boolean
        default: false

permissions:
  contents: write  # needed so the workflow can commit seen_notices.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run notice checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_MODE: ${{ inputs.test_mode }}
        run: python check_notices.py

      - name: Commit updated state
        run: |
          git config user.name "notice-bot"
          git config user.email "notice-bot@users.noreply.github.com"
          git add seen_notices.json
          git diff --staged --quiet || git commit -m "Update seen notices"
          git push
